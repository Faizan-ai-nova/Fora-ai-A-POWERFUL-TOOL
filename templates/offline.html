<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>You're offline — Fora AI</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: #0a0d13; color: #e8e6e1;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    padding: 24px; text-align: center;
  }
  .card {
    max-width: 420px; width: 100%;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 20px;
    padding: 40px 28px;
  }
  .icon { font-size: 44px; margin-bottom: 18px; }
  h1 { font-size: 20px; margin: 0 0 10px; color: #fff; }
  p { font-size: 14.5px; line-height: 1.6; color: #a8a6a1; margin: 0 0 24px; }
  button {
    background: #e0a83e; color: #0a0d13; border: none; border-radius: 10px;
    padding: 12px 22px; font-size: 14.5px; font-weight: 600; cursor: pointer;
    width: 100%;
  }
  button:active { opacity: 0.85; }
</style>
</head>
<body>
  <div class="card">
    <div class="icon">📡</div>
    <h1>You're offline</h1>
    <p>Fora AI needs an internet connection to scan code and load your reports. Check your connection and try again — anything you already opened may still be cached.</p>
    <button onclick="window.location.reload()">Try again</button>
  </div>
</body>
</html>
