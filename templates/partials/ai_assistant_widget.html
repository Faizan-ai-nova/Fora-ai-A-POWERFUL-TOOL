<style>
  #ai-assistant-toggle {
    position: fixed; bottom: 22px; right: 22px; z-index: 9999;
    width: 56px; height: 56px; border-radius: 50%;
    background: var(--accent-indigo); border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px; box-shadow: 0 6px 20px rgba(0,0,0,0.35);
    transition: transform 0.15s ease;
  }
  #ai-assistant-toggle:hover { transform: scale(1.06); }

  #ai-assistant-panel {
    position: fixed; bottom: 90px; right: 22px; z-index: 9999;
    width: min(360px, calc(100vw - 32px)); height: min(480px, calc(100vh - 140px));
    background: var(--bg-elevated); border: 1px solid var(--border-glass-strong);
    border-radius: var(--radius-lg); box-shadow: 0 12px 40px rgba(0,0,0,0.45);
    display: none; flex-direction: column; overflow: hidden;
    font-family: var(--font-body);
  }
  #ai-assistant-panel.open { display: flex; }

  .ai-assistant-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 16px; border-bottom: 1px solid var(--border-glass);
    background: var(--bg-secondary);
  }
  .ai-assistant-header .title { font-size: 14.5px; font-weight: 600; color: var(--text-primary); display: flex; align-items: center; gap: 8px; }
  .ai-assistant-header .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--success); display: inline-block; }
  .ai-assistant-close { background: none; border: none; color: var(--text-muted); font-size: 18px; cursor: pointer; line-height: 1; padding: 4px; }
  .ai-assistant-close:hover { color: var(--text-primary); }

  .ai-assistant-messages {
    flex: 1; overflow-y: auto; padding: 14px 16px; display: flex; flex-direction: column; gap: 10px;
  }
  .ai-msg { max-width: 85%; padding: 9px 12px; border-radius: var(--radius-md); font-size: 13.5px; line-height: 1.5; }
  .ai-msg.bot { align-self: flex-start; background: var(--bg-glass); border: 1px solid var(--border-glass); color: var(--text-primary); }
  .ai-msg.user { align-self: flex-end; background: var(--accent-indigo); color: #0a0d13; font-weight: 500; }
  .ai-msg.typing { align-self: flex-start; color: var(--text-muted); font-size: 13px; font-style: italic; }
  .ai-msg.limit { align-self: center; background: var(--bg-glass); border: 1px solid var(--border-glass-strong); color: var(--text-secondary); text-align: center; font-size: 12.5px; }

  .ai-assistant-input-row {
    display: flex; gap: 8px; padding: 12px; border-top: 1px solid var(--border-glass);
    background: var(--bg-secondary);
  }
  .ai-assistant-input-row input {
    flex: 1; padding: 10px 12px; border-radius: var(--radius-sm);
    border: 1px solid var(--border-glass-strong); background: var(--bg-primary); color: var(--text-primary);
    font-family: var(--font-body); font-size: 16px;
  }
  .ai-assistant-input-row input:focus { outline: none; border-color: var(--accent-indigo); }
  .ai-assistant-input-row input:disabled { opacity: 0.5; }
  .ai-assistant-input-row button {
    background: var(--accent-indigo); border: none; border-radius: var(--radius-sm);
    width: 38px; height: 38px; cursor: pointer; font-size: 15px; flex-shrink: 0; color: #0a0d13;
  }
  .ai-assistant-input-row button:disabled { opacity: 0.5; cursor: default; }

  @media (max-width: 480px) {
    #ai-assistant-panel {
      right: 12px; left: 12px; bottom: 78px;
      width: auto; height: min(70vh, 480px);
    }
    #ai-assistant-toggle { right: 16px; bottom: 16px; }
  }
</style>

<button id="ai-assistant-toggle" aria-label="Open AI assistant" onclick="aiAssistantToggle()">💬</button>

<div id="ai-assistant-panel">
  {% csrf_token %}
  <div class="ai-assistant-header">
    <span class="title"><span class="dot"></span> Fora AI Assistant</span>
    <button class="ai-assistant-close" onclick="aiAssistantToggle()">✕</button>
  </div>
  <div class="ai-assistant-messages" id="ai-assistant-messages">
    <div class="ai-msg bot">Hey! I'm the Fora AI assistant. Ask me anything about security concepts or how to use the scanner. 🙂</div>
  </div>
  <div class="ai-assistant-input-row">
    <input type="text" id="ai-assistant-input" placeholder="Ask a question…" maxlength="1000" onkeydown="if(event.key==='Enter')aiAssistantSend();">
    <button id="ai-assistant-send" onclick="aiAssistantSend()">➤</button>
  </div>
</div>

<script>
  function aiAssistantToggle() {
    document.getElementById('ai-assistant-panel').classList.toggle('open');
  }

  function aiAssistantGetCsrfToken() {
    const el = document.querySelector('#ai-assistant-panel [name=csrfmiddlewaretoken]');
    return el ? el.value : '';
  }

  function aiAssistantAppend(text, cls) {
    const box = document.getElementById('ai-assistant-messages');
    const div = document.createElement('div');
    div.className = 'ai-msg ' + cls;
    div.textContent = text;
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
    return div;
  }

  async function aiAssistantSend() {
    const input = document.getElementById('ai-assistant-input');
    const sendBtn = document.getElementById('ai-assistant-send');
    const text = input.value.trim();
    if (!text) return;

    aiAssistantAppend(text, 'user');
    input.value = '';
    input.disabled = true;
    sendBtn.disabled = true;
    const typingEl = aiAssistantAppend('Typing…', 'typing');

    try {
      const res = await fetch('/assistant/chat/', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'X-CSRFToken': aiAssistantGetCsrfToken(),
        },
        body: JSON.stringify({ message: text }),
      });
      const data = await res.json();
      typingEl.remove();

      if (data.limit_reached) {
        aiAssistantAppend(data.reply, 'limit');
        input.disabled = true;
        sendBtn.disabled = true;
        input.placeholder = 'Limit reached';
        return;
      }

      aiAssistantAppend(data.reply || data.error || 'Something went wrong.', 'bot');
    } catch (err) {
      typingEl.remove();
      aiAssistantAppend("Sorry, I couldn't reach the assistant right now.", 'bot');
    } finally {
      if (!input.disabled) {
        sendBtn.disabled = false;
        input.focus();
      } else {
        sendBtn.disabled = true;
      }
    }
  }
</script>
