{% load static %}
<nav class="navbar">
  <a href="{% url 'landing' %}" class="navbar-brand">
    <span class="sidebar-logo-mark">🛡️</span>
    Fora<span class="text-gradient">AI</span>
  </a>
  <div class="navbar-links" data-navbar-links>
    <a href="{% url 'landing' %}#features">Features</a>
    <a href="{% url 'pages:features' %}">Product</a>
    <a href="{% url 'subscriptions:pricing' %}">Pricing</a>
    <a href="{% url 'blog:list' %}">Blog</a>
    <a href="{% url 'pages:about' %}">About</a>
    <a href="{% url 'pages:github_integration_docs' %}">Github Docs</a>
    <div class="navbar-actions-mobile">
      {% if request.user.is_authenticated %}
        <a href="{% url 'dashboard:home' %}" class="btn btn-primary btn-sm btn-block">Dashboard</a>
      {% else %}
        <a href="{% url 'accounts:login' %}" class="btn btn-ghost btn-sm btn-block">Log in</a>
        <a href="{% url 'accounts:register' %}" class="btn btn-primary btn-sm btn-block">Start scanning free</a>
      {% endif %}
    </div>
  </div>
  <div class="navbar-actions">
    {% if request.user.is_authenticated %}
      <a href="{% url 'dashboard:home' %}" class="btn btn-primary btn-sm">Dashboard</a>
    {% else %}
      <a href="{% url 'accounts:login' %}" class="btn btn-ghost btn-sm">Log in</a>
      <a href="{% url 'accounts:register' %}" class="btn btn-primary btn-sm">Start scanning free</a>
    {% endif %}
  </div>
  <button type="button" class="navbar-burger" data-navbar-toggle aria-label="Toggle menu">☰</button>
</nav>
<div class="navbar-overlay" data-navbar-overlay></div>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    const toggle = document.querySelector('[data-navbar-toggle]');
    const links = document.querySelector('[data-navbar-links]');
    const overlay = document.querySelector('[data-navbar-overlay]');
    if (toggle && links && overlay) {
      toggle.addEventListener('click', () => { links.classList.toggle('open'); overlay.classList.toggle('open'); });
      overlay.addEventListener('click', () => { links.classList.remove('open'); overlay.classList.remove('open'); });
      links.querySelectorAll('a').forEach(a => a.addEventListener('click', () => {
        links.classList.remove('open'); overlay.classList.remove('open');
      }));
    }
  });
</script>
