{% extends "base.html" %}
{% block title %}Reset your password — Fora AI{% endblock %}
{% block content %}
{% include "partials/public_nav.html" %}
<div class="container-narrow" style="padding: 60px 20px;">
  <div class="glass-card padded" style="max-width: 420px; margin: 0 auto;">
    <h1 style="font-size: 24px; text-align:center;">Forgot your password?</h1>
    <p class="text-secondary mt-8" style="text-align:center; font-size: 14px;">
      Enter your email and we'll send you a reset link.
    </p>
    <form method="post" class="mt-24">
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label">Email</label>
        {{ form.email }}
      </div>
      <button type="submit" class="btn btn-primary btn-block btn-lg">Send reset link</button>
    </form>
    <p class="text-secondary mt-24" style="text-align:center; font-size: 14px;">
      <a href="{% url 'accounts:login' %}" class="text-gradient" style="font-weight:600;">← Back to log in</a>
    </p>
  </div>
</div>
{% endblock %}
